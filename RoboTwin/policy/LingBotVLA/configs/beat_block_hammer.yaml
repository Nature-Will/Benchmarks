model:
  model_path: /mnt/shared-storage-user/p1-shared/yujiale/models/lingbot-vla-4b
  tokenizer_path: /mnt/shared-storage-user/p1-shared/yujiale/models/Qwen2.5-VL-3B-Instruct/
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: robotwin_beat_block_hammer
  train_path: /mnt/shared-storage-user/p1-shared/yujiale/code/benchmarks/RoboTwin/policy/LingBotVLA/lerobot_data/beat_block_hammer
  num_workers: 8
  norm_type: bounds_99_woclip
  norm_stats_file: /mnt/shared-storage-user/p1-shared/yujiale/code/benchmarks/RoboTwin/policy/LingBotVLA/norm_stats/beat_block_hammer.json
  img_size: 224

train:
  output_dir: /mnt/shared-storage-user/p1-shared/yujiale/code/benchmarks/RoboTwin/policy/LingBotVLA/checkpoints/beat_block_hammer
  loss_type: L1_fm
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: true
  use_wandb: false
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 24
  action_dim: 14
  max_action_dim: 75
  max_state_dim: 75
  chunk_size: 50
  lr: 1.0e-4
  lr_decay_style: constant
  num_train_epochs: 200
  micro_batch_size: 4
  global_batch_size: 32
  max_steps: 10000
  ckpt_manager: dcp
  save_steps: 5000
  save_epochs: 50
  enable_fp32: true
  enable_resume: true
